services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      WB_DISABLE_HF_MODELS: ${WB_DISABLE_HF_MODELS:-1}
      WB_USE_GEMMA: ${WB_USE_GEMMA:-1}
      WB_GEMMA_MODEL: ${WB_GEMMA_MODEL:-google/gemma-2-2b-it}
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - backend
